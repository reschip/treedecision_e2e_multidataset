name: tree-decision-api

# --- Web Services -----------------------------------------------------------
services:
  - name: api
    # Build from Dockerfile (multi-stage, context = repo root)
    dockerfile_path: services/model_api/Dockerfile
    source_dir: /           # Build context is the repo root
    github:
      branch: main          # ← cambia a tu rama si no es "main"
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs   # $5/mes — cambia a basic-xs si necesitas más RAM

    # Health check (FastAPI expone /health)
    health_check:
      http_path: /health

    # Variables de entorno (las mismas de tu .env.example)
    envs:
      - key: API_VERSION
        value: "0.1.0"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PREDICT_RATE_LIMIT
        value: "60/minute"
      - key: INFO_RATE_LIMIT
        value: "120/minute"
      - key: LOG_LEVEL
        value: "INFO"
